server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/localhost+2.pem;
    ssl_certificate_key /etc/nginx/certs/localhost+2-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so the upstream `api` host is re-resolved
    # on every request — keeps the proxy alive when the api container is
    # rebuilt and gets a new IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Compress text-like responses. Static asset bundles + JSON API
    # payloads benefit the most on weak networks.
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_comp_level 6;
    gzip_proxied any;
    # text/html is gzipped by default — listing it would warn about a duplicate.
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # API proxy
    location /api {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # SPA fallback. Force revalidation on the HTML shell so users pick up
    # new bundle hashes without a hard-refresh; the actual JS/CSS assets
    # are still cached for 1 year (handled by the regex location below).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        expires -1;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
