<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSS Pal - 抓取</title>
<style>
body{font:16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f9fafb;color:#222}
.box{padding:28px 36px;background:#fff;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.08);max-width:520px;text-align:center}
h1{margin:0 0 12px;font-size:20px}
h1.ok{color:#16a34a}
h1.err{color:#dc2626}
h1.info{color:#2563eb}
p{margin:6px 0;line-height:1.5}
.hint{color:#9ca3af;font-size:13px;margin-top:18px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:s .8s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box" id="box">
  <h1 class="info"><span class="spinner"></span>等待页面数据…</h1>
  <p class="hint">如果一直停在这里，请确认是从书签栏触发的</p>
</div>
<script>
(function () {
  var box = document.getElementById('box');

  function render(cls, heading, msg, autoClose) {
    box.innerHTML =
      '<h1 class="' + cls + '">' + heading + '</h1>' +
      '<p>' + (msg || '') + '</p>' +
      (autoClose
        ? '<p class="hint">2.5 秒后自动关闭…</p>'
        : '<p class="hint">可关闭此页面</p>');
    if (autoClose) setTimeout(function () { try { window.close(); } catch (e) {} }, 2500);
  }
  function escapeText(s) { var d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
  function fail(msg) { render('err', '❌ 抓取失败', escapeText(msg), false); }

  // Payload comes in via the URL fragment (#base64-of-json). We previously
  // relayed it via window.opener.postMessage, but Cross-Origin-Opener-Policy:
  // same-origin on the source page (e.g. rockpapershotgun.com) severs
  // window.opener on the popup, breaking the handshake. Fragments are
  // client-only, not sent to any server, and avoid the cap that limited the
  // postMessage path (though the bookmarklet still strips script/style to
  // keep the URL reasonable).
  var hash = location.hash.slice(1);
  if (!hash) {
    fail('缺少数据 — 如果是从书签栏点的，说明你用的还是旧版书签，请到 RSS Pal 设置页重新把按钮拖到书签栏后再试。');
    return;
  }
  var d;
  try {
    // bookmarklet does: btoa(unescape(encodeURIComponent(JSON.stringify(p))))
    var json = decodeURIComponent(escape(atob(hash)));
    d = JSON.parse(json);
  } catch (e) {
    fail('解析数据失败: ' + e.message);
    return;
  }
  // Wipe the fragment so the token + page HTML don't linger in tab history.
  try { history.replaceState(null, '', location.pathname); } catch (e) {}

  if (!d || !d.token || !d.url || !d.html) {
    fail('数据不完整');
    return;
  }

  function postCapture(force) {
    return fetch('/api/bookmarklet/capture', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + d.token,
      },
      body: JSON.stringify({
        url: d.url,
        title: d.title || '',
        html: d.html,
        force: !!force,
      }),
    })
      .then(function (r) {
        return r.json().then(function (j) { return { ok: r.ok, j: j, status: r.status }; });
      });
  }

  function handleResponse(x) {
    if (!x.ok) {
      fail(x.j && x.j.error ? x.j.error : 'HTTP ' + x.status);
      return;
    }
    var phase = x.j.status;
    if (phase === 'duplicate') {
      renderDuplicatePrompt(x.j);
      return;
    }
    var heading = phase === 'created' ? '✅ 已收藏'
      : phase === 'updated' ? '✅ 已更新'
      : '✅ 抓取成功';
    render('ok', heading, escapeText(x.j.message), true);
  }

  function renderDuplicatePrompt(j) {
    box.innerHTML =
      '<h1 class="info">⚠️ 已有同 URL 文章</h1>'
      + '<p>现有内容 ' + j.existing_length + ' 字 · ' + (j.existing_images || 0) + ' 图</p>'
      + '<p>新内容 ' + j.new_length + ' 字 · ' + (j.new_images || 0) + ' 图</p>'
      + '<p>怎么处理？</p>'
      + '<div style="margin-top:14px;display:flex;gap:8px;justify-content:center;">'
      +   '<button id="ow" style="padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;">覆盖</button>'
      +   '<button id="kp" style="padding:8px 18px;background:#f3f4f6;border:1px solid #ddd;border-radius:6px;cursor:pointer;">保留旧内容</button>'
      + '</div>';
    document.getElementById('ow').onclick = function () {
      box.innerHTML = '<h1 class="info"><span class="spinner"></span>正在覆盖…</h1>';
      postCapture(true).then(handleResponse).catch(function (err) { fail('网络错误: ' + err.message); });
    };
    document.getElementById('kp').onclick = function () {
      render('info', 'ℹ️ 已保留旧内容', '可关闭此页面', false);
    };
  }

  box.innerHTML = '<h1 class="info"><span class="spinner"></span>正在保存…</h1>';
  postCapture(false).then(handleResponse).catch(function (err) { fail('网络错误: ' + err.message); });
})();
</script>
</body>
</html>
