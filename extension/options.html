<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="options-container">
    <h1>⚙️ RSS Pal 设置</h1>

    <div class="form-group">
      <label for="serverUrl">服务器地址</label>
      <input type="url" id="serverUrl" placeholder="https://your-rss-pal.example.com">
      <div class="hint">RSS Pal 服务的完整 URL 地址</div>
    </div>

    <div class="form-group">
      <label for="token">Bookmarklet Token</label>
      <input type="text" id="token" placeholder="在 RSS Pal 设置页面获取 Token">
      <div class="hint">在 RSS Pal 网页端「设置 → 书签小工具」中获取</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn">💾 保存</button>
      <button class="btn btn-secondary" id="testBtn">🔌 测试连接</button>
    </div>

    <div class="options-status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
