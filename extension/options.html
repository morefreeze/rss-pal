<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="options-container">
    <h1>⚙️ RSS Pal 设置</h1>

    <div class="form-group">
      <label for="serverUrl">服务器地址</label>
      <input type="url" id="serverUrl" placeholder="https://your-rss-pal.example.com">
      <div class="hint">RSS Pal 服务的完整 URL 地址</div>
    </div>

    <div class="form-group">
      <label for="token">Bookmarklet Token</label>
      <input type="text" id="token" placeholder="在 RSS Pal 设置页面获取 Token">
      <div class="hint">在 RSS Pal 网页端「设置 → 书签小工具」中获取</div>
    </div>

    <div class="form-group">
      <div class="hint">
        💡 想从本地 PDF 文件（file:// 链接）网摘？请到
        <code>chrome://extensions</code>，找到 RSS Pal，
        点击「详情」，开启「允许访问文件 URL」。
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn">💾 保存</button>
      <button class="btn btn-secondary" id="testBtn">🔌 测试连接</button>
    </div>

    <div class="options-status" id="status"></div>

    <section class="options-section">
      <h3>Twitter 自动抓取</h3>
      <div class="hint" style="margin-bottom:8px;">
        在 x.com 上打开匹配页面时，是否自动抓取其中的推文并发送到 RSS Pal。
      </div>
      <label class="toggle-row"><input type="checkbox" id="twListEnabled" checked /> 自动抓取 list 时间线</label>
      <label class="toggle-row"><input type="checkbox" id="twUserEnabled" checked /> 自动抓取我打开的用户主页</label>
      <label class="toggle-row"><input type="checkbox" id="twBookmarksEnabled" checked /> 自动抓取我的 Bookmarks 页</label>
      <label class="toggle-row toggle-row-future"><input type="checkbox" id="twHomeEnabled" disabled /> 自动抓取 Home Timeline（未开放，噪音多）</label>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
