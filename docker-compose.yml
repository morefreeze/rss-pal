version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rsspal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rsspal
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-rss-pal-secret-change-in-production}
      JINA_API_KEY: ${JINA_API_KEY}
      SERVER_PORT: 8080
      RSSHUB_BASE_URL: http://rsshub:1200
      BACKUP_DIR: /backups
    depends_on:
      postgres:
        condition: service_healthy
      rsshub:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      # Host-mounted so backups survive `docker compose down -v` and a fresh
      # rebuild can discover prior snapshots for restore.
      - ./backups:/backups

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rsspal
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      JINA_API_KEY: ${JINA_API_KEY}
      RSSHUB_BASE_URL: http://rsshub:1200
      BACKUP_DIR: /backups
    depends_on:
      postgres:
        condition: service_healthy
      rsshub:
        condition: service_started
    volumes:
      - ./backups:/backups

  rsshub:
    # chromium-bundled tag ships Playwright + headless Chromium so routes
    # that need browser-mode (e.g. Bilibili user/video which now requires
    # signing) actually work end-to-end.
    image: diygod/rsshub:chromium-bundled
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: 3600
      REQUEST_TIMEOUT: 30000
      # Bilibili needs a logged-in cookie to bypass anti-bot; set BILIBILI_COOKIE
      # in .env (DevTools → Cookies → bilibili.com → copy the full cookie string).
      BILIBILI_COOKIE_DEFAULT: ${BILIBILI_COOKIE:-}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api

  status-monitor:
    build:
      context: ./status-monitor
      dockerfile: Dockerfile
    environment:
      MONITOR_DOMAIN: https://freezemacbook-pro.tailf22f5.ts.net
      LOCAL_URL: http://frontend:80
      CHECK_INTERVAL: 60
      MONITOR_PORT: 8090
    ports:
      - "8090:8090"
    volumes:
      - status_data:/data
      - ./scripts/domain-checks.db:/data/domain.db
    restart: unless-stopped

volumes:
  postgres_data:
  status_data:
