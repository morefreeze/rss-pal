version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rsspal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rsspal
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-rss-pal-secret-change-in-production}
      JINA_API_KEY: ${JINA_API_KEY}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: rsspal
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com}
      JINA_API_KEY: ${JINA_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
